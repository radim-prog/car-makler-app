<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="Pavel s klíči u přivezeného staršího auta, panelové sídliště v pozadí">
  <defs>
    <clipPath id="pavel01-frame"><rect x="0" y="0" width="480" height="320" rx="14" /></clipPath>
  </defs>
  <g clip-path="url(#pavel01-frame)">
    <rect width="480" height="320" fill="#F4F6FB" />

    <!-- Horizon line -->
    <line x1="0" y1="226" x2="480" y2="226" stroke="#C5CFE0" stroke-width="1" />

    <!-- Panelák silhouette (background, low contrast) -->
    <g fill="#E4E9F2" stroke="#C5CFE0" stroke-width="1">
      <rect x="20"  y="80"  width="110" height="146" />
      <rect x="146" y="60"  width="92"  height="166" />
      <rect x="254" y="92"  width="130" height="134" />
      <rect x="400" y="74"  width="64"  height="152" />
    </g>
    <!-- Windows pattern on paneláky -->
    <g fill="#C5CFE0">
      <!-- blok 1 -->
      <rect x="30"  y="92"  width="10" height="10" /><rect x="48"  y="92"  width="10" height="10" /><rect x="66"  y="92"  width="10" height="10" /><rect x="84"  y="92"  width="10" height="10" /><rect x="102" y="92"  width="10" height="10" />
      <rect x="30"  y="112" width="10" height="10" /><rect x="48"  y="112" width="10" height="10" /><rect x="66"  y="112" width="10" height="10" /><rect x="84"  y="112" width="10" height="10" /><rect x="102" y="112" width="10" height="10" />
      <rect x="30"  y="132" width="10" height="10" /><rect x="48"  y="132" width="10" height="10" /><rect x="66"  y="132" width="10" height="10" /><rect x="84"  y="132" width="10" height="10" /><rect x="102" y="132" width="10" height="10" />
      <rect x="30"  y="152" width="10" height="10" /><rect x="48"  y="152" width="10" height="10" /><rect x="66"  y="152" width="10" height="10" /><rect x="84"  y="152" width="10" height="10" /><rect x="102" y="152" width="10" height="10" />
      <rect x="30"  y="172" width="10" height="10" /><rect x="48"  y="172" width="10" height="10" /><rect x="66"  y="172" width="10" height="10" /><rect x="84"  y="172" width="10" height="10" /><rect x="102" y="172" width="10" height="10" />
      <rect x="30"  y="192" width="10" height="10" /><rect x="48"  y="192" width="10" height="10" /><rect x="66"  y="192" width="10" height="10" /><rect x="84"  y="192" width="10" height="10" /><rect x="102" y="192" width="10" height="10" />
      <!-- blok 2 -->
      <rect x="156" y="76"  width="10" height="10" /><rect x="174" y="76"  width="10" height="10" /><rect x="192" y="76"  width="10" height="10" /><rect x="210" y="76"  width="10" height="10" />
      <rect x="156" y="96"  width="10" height="10" /><rect x="174" y="96"  width="10" height="10" /><rect x="192" y="96"  width="10" height="10" /><rect x="210" y="96"  width="10" height="10" />
      <rect x="156" y="116" width="10" height="10" /><rect x="174" y="116" width="10" height="10" /><rect x="192" y="116" width="10" height="10" /><rect x="210" y="116" width="10" height="10" />
      <rect x="156" y="136" width="10" height="10" /><rect x="174" y="136" width="10" height="10" /><rect x="192" y="136" width="10" height="10" /><rect x="210" y="136" width="10" height="10" />
      <rect x="156" y="156" width="10" height="10" /><rect x="174" y="156" width="10" height="10" /><rect x="192" y="156" width="10" height="10" /><rect x="210" y="156" width="10" height="10" />
      <rect x="156" y="176" width="10" height="10" /><rect x="174" y="176" width="10" height="10" /><rect x="192" y="176" width="10" height="10" /><rect x="210" y="176" width="10" height="10" />
      <rect x="156" y="196" width="10" height="10" /><rect x="174" y="196" width="10" height="10" /><rect x="192" y="196" width="10" height="10" /><rect x="210" y="196" width="10" height="10" />
      <!-- blok 3 -->
      <rect x="264" y="108" width="10" height="10" /><rect x="282" y="108" width="10" height="10" /><rect x="300" y="108" width="10" height="10" /><rect x="318" y="108" width="10" height="10" /><rect x="336" y="108" width="10" height="10" /><rect x="354" y="108" width="10" height="10" />
      <rect x="264" y="128" width="10" height="10" /><rect x="282" y="128" width="10" height="10" /><rect x="300" y="128" width="10" height="10" /><rect x="318" y="128" width="10" height="10" /><rect x="336" y="128" width="10" height="10" /><rect x="354" y="128" width="10" height="10" />
      <rect x="264" y="148" width="10" height="10" /><rect x="282" y="148" width="10" height="10" /><rect x="300" y="148" width="10" height="10" /><rect x="318" y="148" width="10" height="10" /><rect x="336" y="148" width="10" height="10" /><rect x="354" y="148" width="10" height="10" />
      <rect x="264" y="168" width="10" height="10" /><rect x="282" y="168" width="10" height="10" /><rect x="300" y="168" width="10" height="10" /><rect x="318" y="168" width="10" height="10" /><rect x="336" y="168" width="10" height="10" /><rect x="354" y="168" width="10" height="10" />
      <rect x="264" y="188" width="10" height="10" /><rect x="282" y="188" width="10" height="10" /><rect x="300" y="188" width="10" height="10" /><rect x="318" y="188" width="10" height="10" /><rect x="336" y="188" width="10" height="10" /><rect x="354" y="188" width="10" height="10" />
      <!-- blok 4 -->
      <rect x="408" y="88"  width="10" height="10" /><rect x="426" y="88"  width="10" height="10" /><rect x="444" y="88"  width="10" height="10" />
      <rect x="408" y="108" width="10" height="10" /><rect x="426" y="108" width="10" height="10" /><rect x="444" y="108" width="10" height="10" />
      <rect x="408" y="128" width="10" height="10" /><rect x="426" y="128" width="10" height="10" /><rect x="444" y="128" width="10" height="10" />
      <rect x="408" y="148" width="10" height="10" /><rect x="426" y="148" width="10" height="10" /><rect x="444" y="148" width="10" height="10" />
      <rect x="408" y="168" width="10" height="10" /><rect x="426" y="168" width="10" height="10" /><rect x="444" y="168" width="10" height="10" />
      <rect x="408" y="188" width="10" height="10" /><rect x="426" y="188" width="10" height="10" /><rect x="444" y="188" width="10" height="10" />
