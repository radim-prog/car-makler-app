<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="Pavel s diagnostickým tabletem v dílně, auto na zvedáku, nářadí na stěně">
  <defs>
    <clipPath id="pavel03-frame"><rect x="0" y="0" width="480" height="320" rx="14" /></clipPath>
    <linearGradient id="pavel03-lamp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#F97316" stop-opacity="0" />
    </linearGradient>
  </defs>
  <g clip-path="url(#pavel03-frame)">
    <rect width="480" height="320" fill="#F4F6FB" />
    <rect x="0" y="0" width="480" height="232" fill="#E4E9F2" />

    <!-- Pegboard with tools (left wall) -->
    <rect x="26" y="36" width="174" height="104" fill="#C5CFE0" stroke="#94A3BE" stroke-width="1" />
    <g stroke="#0D1F3C" stroke-width="1.4" fill="none" stroke-linecap="round">
      <!-- Wrench -->
      <circle cx="50" cy="58" r="4" />
      <path d="M52 60 L70 78" />
      <circle cx="72" cy="80" r="4" />
      <!-- Hammer -->
      <rect x="88" y="52" width="14" height="8" fill="#0D1F3C" />
      <line x1="95" y1="60" x2="95" y2="92" />
      <!-- Screwdriver (orange tip) -->
      <line x1="124" y1="58" x2="124" y2="94" />
      <rect x="121" y="54" width="6" height="8" fill="#F97316" />
      <!-- Pliers -->
      <path d="M152 60 L162 76 L157 92" />
      <path d="M162 60 L152 76 L157 92" />
      <!-- Ratchet -->
      <line x1="180" y1="56" x2="180" y2="84" />
      <circle cx="180" cy="86" r="5" />
    </g>

    <!-- 2-post lift frame -->
    <g fill="#2D4669" stroke="#040B1F" stroke-width="1.8">
      <rect x="222" y="96" width="10" height="146" />
      <rect x="380" y="96" width="10" height="146" />
      <!-- Top crossbeam -->
      <rect x="222" y="92" width="168" height="8" />
      <!-- Lift arms -->
      <rect x="232" y="160" width="32" height="5" />
      <rect x="348" y="160" width="32" height="5" />
    </g>

    <!-- Work lamp hanging -->
    <g>
      <line x1="306" y1="0" x2="306" y2="78" stroke="#0D1F3C" stroke-width="1.2" />
      <path d="M292 78 L320 78 L316 94 L296 94 Z" fill="#1A2F52" stroke="#040B1F" stroke-width="1.2" />
      <ellipse cx="306" cy="94" rx="10" ry="3" fill="#FDE68A" />
      <!-- Light cone -->
      <path d="M296 94 L282 168 L330 168 L316 94 Z" fill="url(#pavel03-lamp)" />
    </g>

    <!-- Car on lift (raised, side profile) -->
    <g transform="translate(306 148)">
      <path d="M-76 20 L-76 4 Q-72 -8, -60 -10 L-44 -10 L-30 -28 Q-22 -34, -12 -36 L32 -36 Q44 -34, 50 -24 L62 -10 L78 -8 Q88 -6, 90 4 L90 20 Z"
            fill="#1A2F52" stroke="#0D1F3C" stroke-width="1.6" stroke-linejoin="round" />
      <path d="M-26 -26 L-12 -28 Q-6 -30, 0 -30 L8 -30 L14 -26 L8 -12 L-20 -12 Z" fill="#C5CFE0" stroke="#0D1F3C" stroke-width="1" />
      <path d="M16 -26 L30 -30 Q40 -30, 44 -22 L54 -12 L16 -12 Z" fill="#C5CFE0" stroke="#0D1F3C" stroke-width="1" />
      <path d="M-6 -12 L-6 14" stroke="#0D1F3C" stroke-width="1" />
      <!-- Wheels (off ground, lift indicator) -->
      <circle cx="-44" cy="20" r="11" fill="#040B1F" />
      <circle cx="-44" cy="20" r="5" fill="none" stroke="#F97316" stroke-width="1.4" />
      <circle cx="50" cy="20" r="11" fill="#040B1F" />
      <circle cx="50" cy="20" r="5" fill="none" stroke="#F97316" stroke-width="1.4" />
    </g>

    <!-- Floor -->
    <rect x="0" y="232" width="480" height="88" fill="#0D1F3C" />
    <g stroke="#1A2F52" stroke-width="1" opacity="0.75">
      <line x1="0" y1="258" x2="480" y2="258" />
      <line x1="0" y1="288" x2="480" y2="288" />
    </g>

    <!-- Mechanic lying on creeper under car -->
    <g transform="translate(306 242)">
      <ellipse cx="0" cy="10" rx="52" ry="4" fill="#040B1F" opacity="0.5" />
      <rect x="-42" y="-4" width="84" height="10" rx="4" fill="#1A2F52" stroke="#040B1F" stroke-width="1.2" />
      <!-- Boots sticking out -->
      <rect x="-50" y="-6" width="10" height="10" fill="#2D4669" />
      <rect x="40" y="-6" width="10" height="10" fill="#2D4669" />
      <!-- Creeper wheels -->
      <circle cx="-36" cy="8" r="2.4" fill="#F97316" />
      <circle cx="36" cy="8" r="2.4" fill="#F97316" />
    </g>

    <!-- Tool chest (left foreground) -->
    <g transform="translate(58 232)">
      <rect x="0" y="0" width="94" height="78" fill="#1A2F52" stroke="#040B1F" stroke-width="1.4" />
      <rect x="0" y="0" width="94" height="18" fill="#0D1F3C" />
      <line x1="0" y1="36" x2="94" y2="36" stroke="#040B1F" stroke-width="1" />
      <line x1="0" y1="54" x2="94" y2="54" stroke="#040B1F" stroke-width="1" />
      <line x1="0" y1="72" x2="94" y2="72" stroke="#040B1F" stroke-width="1" />
      <rect x="38" y="8" width="18" height="2" fill="#F97316" />
      <rect x="38" y="26" width="18" height="2" fill="#94A3BE" />
      <rect x="38" y="44" width="18" height="2" fill="#94A3BE" />
      <rect x="38" y="62" width="18" height="2" fill="#94A3BE" />
    </g>

    <!-- Tire stack (right foreground) -->
    <g transform="translate(434 298)">
      <ellipse cx="0" cy="0" rx="26" ry="5" fill="#040B1F" />
      <ellipse cx="0" cy="-10" rx="26" ry="5" fill="#0D1F3C" stroke="#040B1F" stroke-width="1" />
      <ellipse cx="0" cy="-20" rx="26" ry="5" fill="#0D1F3C" stroke="#040B1F" stroke-width="1" />
      <ellipse cx="0" cy="-30" rx="26" ry="5" fill="#1A2F52" stroke="#040B1F" stroke-width="1" />
    </g>

    <!-- Pavel standing with diagnostic tablet (right, mid-ground) -->
    <g transform="translate(200 288)">
      <ellipse cx="0" cy="12" rx="18" ry="3" fill="#040B1F" opacity="0.4" />
      <!-- Legs -->
      <path d="M-8 10 L-8 -42 L-1 -42 L-1 10 Z" fill="#0D1F3C" />
      <path d="M1 10 L1 -42 L8 -42 L8 10 Z" fill="#0D1F3C" />
      <!-- Torso -->
      <path d="M-14 -42 Q-14 -78, 0 -80 Q14 -78, 14 -42 Z" fill="#1A2F52" />
      <!-- Right arm holding tablet toward center -->
      <path d="M14 -70 Q32 -58, 34 -44 L28 -42 L12 -62 Z" fill="#1A2F52" />
      <!-- Left arm -->
      <path d="M-14 -72 Q-18 -60, -16 -44 L-10 -44 L-10 -70 Z" fill="#1A2F52" />
      <!-- Head -->
      <circle cx="0" cy="-90" r="10" fill="#2D4669" />
      <!-- Diagnostic tablet -->
      <g transform="translate(40 -40) rotate(-8)">
        <rect x="-16" y="-11" width="32" height="22" rx="2" fill="#040B1F" stroke="#0D1F3C" stroke-width="1" />
        <rect x="-14" y="-9" width="28" height="18" fill="#1A2F52" />
        <polyline points="-11,5 -7,1 -3,-1 1,-5 5,-3 9,-6 13,-4" fill="none" stroke="#F97316" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
      </g>
    </g>

    <!-- Status badge (top right): STK ✓ -->
    <g transform="translate(412 54)">
      <rect x="-56" y="-14" width="112" height="28" rx="14" fill="#0D1F3C" />
      <circle cx="-40" cy="0" r="3.5" fill="#10B981" />
      <text x="-28" y="4" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="0.08em" fill="#F4F6FB">STK</text>
      <text x="-8" y="4" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="0.08em" fill="#F97316">✓ 45 tis.</text>
    </g>

    <!-- Accent sparkle -->
    <g fill="#F97316">
      <path d="M448 156 L450 162 L456 164 L450 166 L448 172 L446 166 L440 164 L446 162 Z" />
    </g>
  </g>
</svg>
