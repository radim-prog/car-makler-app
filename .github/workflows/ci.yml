name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      sandbox_url:
        description: "Base URL for external smoke test"
        required: false
        default: "https://car.zajcon.cz"

# Zrusit predchozi behy na stejnem branchi
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

jobs:
  # ==========================================
  # 1. Lint — ESLint
  # ==========================================
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Run ESLint
        run: npm run lint

  # ==========================================
  # 2. Typecheck — TypeScript
  # ==========================================
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Run TypeScript check
        run: npm run typecheck

  # ==========================================
  # 3. Unit testy — Vitest
  # ==========================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Run unit tests
        run: npm run test:run

  # ==========================================
  # 4. Build — Next.js production build
  # ==========================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Build
        run: npm run build
        env:
          # Dummy env vars pro build (ne realne klice)
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          NEXTAUTH_SECRET: "ci-build-secret-not-real"
          NEXTAUTH_URL: "http://localhost:3000"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_MAIN_URL: "http://localhost:3000"
          NEXT_PUBLIC_INZERCE_URL: "http://localhost:3000/inzerce"
          NEXT_PUBLIC_SHOP_URL: "http://localhost:3000/shop"
          NEXT_PUBLIC_MARKETPLACE_URL: "http://localhost:3000/marketplace"

  # ==========================================
  # 5. External smoke — manual sandbox check
  # ==========================================
  sandbox-smoke:
    name: Sandbox Smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run external smoke
        run: npm run test:e2e:smoke
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.sandbox_url || 'https://car.zajcon.cz' }}
          PLAYWRIGHT_INZERCE_URL: "https://inzerce.car.zajcon.cz"
          PLAYWRIGHT_SHOP_URL: "https://shop.car.zajcon.cz"
          PLAYWRIGHT_MARKETPLACE_URL: "https://marketplace.car.zajcon.cz"
